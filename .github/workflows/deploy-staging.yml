name: Deploy to Staging

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer:v2

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.STAGING_HOSTNAME }} >> ~/.ssh/known_hosts

      - name: Install Deployer
        run: composer require --no-interaction deployer/deployer:^7.0

      - name: Deploy to Staging
        run: vendor/bin/dep deploy staging
        env:
          GIT_REPOSITORY: ${{ github.server_url }}/${{ github.repository }}.git
          STAGING_HOSTNAME: ${{ secrets.STAGING_HOSTNAME }}
          STAGING_PORT: ${{ secrets.STAGING_PORT }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
