name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer:v2

      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          PROD_HOSTNAME: ${{ secrets.PROD_HOSTNAME }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p "$PROD_PORT" "$PROD_HOSTNAME" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install Deployer
        run: composer require --no-interaction deployer/deployer:^7.0

      - name: Verify SSH connection
        env:
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_HOSTNAME: ${{ secrets.PROD_HOSTNAME }}
        run: |
          ssh -p "$PROD_PORT" -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key \
              "$PROD_USER@$PROD_HOSTNAME" "echo connected" || echo "SSH FAILED"

      - name: Deploy to Production
        env:
          GIT_REPOSITORY: ${{ github.server_url }}/${{ github.repository }}.git
          PROD_HOSTNAME: ${{ secrets.PROD_HOSTNAME }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        run: vendor/bin/dep deploy production
