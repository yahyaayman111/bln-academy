name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer:v2

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.PROD_HOSTNAME }} >> ~/.ssh/known_hosts

      - name: Install Deployer
        run: composer require --no-interaction deployer/deployer:^7.0

      - name: Deploy to Production
        run: vendor/bin/dep deploy production
        env:
          GIT_REPOSITORY: ${{ github.server_url }}/${{ github.repository }}.git
          PROD_HOSTNAME: ${{ secrets.PROD_HOSTNAME }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
